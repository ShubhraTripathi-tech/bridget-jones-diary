<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diary</title>

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <h1>📒 My Diary</h1>

    <!-- CREATE ENTRY -->
    <section>
      <h2>Add Entry</h2>
      <form id="entryForm">
        <input id="title" placeholder="Title" required />
        <textarea
          id="content"
          placeholder="Write your thoughts..."
          required
        ></textarea>
        <input id="category" placeholder="Category" required />
        <input id="created_at" type="datetime-local" required />
        <button type="submit">Add Entry</button>
      </form>
    </section>

    <!-- SEARCH -->
    <section>
      <h2>Search</h2>
      <input id="searchCategory" placeholder="Category" />
      <input id="searchYear" placeholder="Year" />
      <input id="searchMonth" placeholder="Month" />
      <button onclick="searchEntries()">Search</button>
      <button onclick="loadEntries()">Reset</button>
    </section>

    <!-- ENTRIES LIST -->
    <section>
      <h2>Entries</h2>
      <ul id="entriesList"></ul>
    </section>
  </body>
</html>
